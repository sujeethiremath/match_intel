  utc_offset_hours: -6
  midnight_scrape_cron: "0 0 * * *"
  topup_scrape_cron: "0 6 * * *"
  email_send_cron: "0 8 * * *"
  log_dir: /home/superman/match-intel/logs
  always_send_email: true

email:
  recipient: hiremath09@gmail.com
  sender: mrguntherr@gmail.com
